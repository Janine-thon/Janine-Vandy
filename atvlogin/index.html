<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        float: "float 3s ease-in-out infinite",
                        'glow-pulse': 'glow 2s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            "0%, 100%": { transform: "translateY(0px)" },
                            "50%": { transform: "translateY(-12px)" }
                        },
                        glow: {
                            '0%, 100%': { opacity: 0.3 },
                            '50%': { opacity: 0.6 },
                        }
                    }
                }
            }
        }
    </script>

    <title>Exercício Tailwind</title>
</head>

<body class="bg-[#0033a0] min-h-screen flex items-center justify-center p-4 overflow-hidden relative">

    <div class="absolute inset-0 flex justify-center pointer-events-none">
        <div class="absolute inset-0 bg-blue-500/10 rounded-full blur-[200px]"></div>

        <div class="absolute top-0 flex gap-4 opacity-40">
            <div class="w-2 h-[45vh] bg-gradient-to-b from-blue-300 via-blue-100 to-transparent blur-sm mx-10"></div>
            <div class="w-8 h-[60vh] bg-gradient-to-b from-blue-400 via-white to-transparent blur-2xl"></div>
            <div class="w-1 h-[50vh] bg-gradient-to-b from-blue-200 to-transparent blur-sm mx-10"></div>
        </div>

        <div class="absolute bottom-0 flex gap-6 opacity-60">
            <div class="w-1 h-[55vh] bg-gradient-to-t from-yellow-300 via-orange-100 to-transparent blur-sm mx-12"></div>
            <div class="w-10 h-[70vh] bg-gradient-to-t from-orange-500 via-yellow-200 to-transparent blur-2xl"></div>
            <div class="w-4 h-[60vh] bg-gradient-to-t from-yellow-500 via-white to-transparent blur-lg"></div>
            <div class="w-2 h-[50vh] bg-gradient-to-t from-red-500 to-transparent blur-md mx-12"></div>
        </div>
    </div>

    <div class="relative animate-float w-full max-w-3xl">
        
        <div class="absolute -inset-4 bg-gradient-to-b from-yellow-600 via-yellow-300 to-orange-600 rounded-[2rem] blur-2xl opacity-40 animate-glow-pulse"></div>
        <div class="absolute inset-0 bg-gradient-to-b from-amber-400/30 to-orange-500/20 rounded-2xl blur-md"></div>

        <div class="relative z-10 bg-white p-8 rounded-2xl shadow-2xl space-y-6 border-t-8 border-red-600">

            <header class="bg-blue-700 text-white text-center py-6 shadow-md border-b-4 border-yellow-400 rounded-t-lg relative overflow-hidden">
                <div class="absolute inset-0 bg-white/5 skew-x-[-15deg] translate-x-[-100%] animate-[shimmer_3s_infinite]"></div>
                
                <h1 class="text-3xl md:text-4xl font-extrabold tracking-wide uppercase italic drop-shadow-md">
                    Exercício de Tailwind CSS
                </h1>
            </header>

            <p class="text-gray-700 leading-relaxed text-justify">
                Esta é uma página simples para praticar os conceitos básicos do Tailwind CSS.
            </p>

            <ul class="list-disc list-inside text-gray-700 space-y-2">
                <li>Uso de cores</li>
                <li>Espaçamento</li>
                <li>Tipografia</li>
            </ul>

            <button class="relative w-full md:w-auto bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-5 rounded-lg mt-2 transition duration-300 hover:scale-105 hover:shadow-lg active:scale-95 shadow-[0_0_15px_rgba(220,38,38,0.3)] group overflow-hidden">
                <span class="relative z-10">Clique aqui</span>
                <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-700"></div>
            </button>

            <footer class="bg-blue-900 text-gray-300 text-center py-4 mt-4 rounded-b-lg border-t border-white/10">
                <p class="text-sm">
                    &copy; 2026 - Aula de Tailwind CSS
                </p>
            </footer>

        </div>
    </div>

</body>
</html>
